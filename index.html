<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refund | solicite seu reembolso</title>
</head>
<body class="bg-green-100">
        <header class="flex gap-2 items-center my-10 container">
            <img src="assets/imgs/icons/Vector.svg" alt="" class="w-10">
            <h1 class="font-sans font-bold text-3xl text-green-700">refund</h1>
        </header>
        <main class="grid-coluns container gap-8">
            <section class="bg-white p-10 rounded-xl">
                <h2 class="text-2xl font-bold my-2">Solicitação de reembolso</h2>
                <span>Informe os dados da despesa para solicitar reembolso. 
                A despesa será analisada e reembolsada em até 30 dias.</span>

                <form action="" class="my-10 text-gray-600 ">
                    <label for="title" class="font-light">Titulo da despesa</label>
                    <input type="text" id="title" class="border-2 rounded-md w-full h-10 my-4 p-4 despesas-txt border-gray-200">
                    <fieldset class="gap-4 grid-price">
                        <div>
                            <label for="category" class="font-light text-gray-600">Categoria</label>
                            <select name="category" id="category" class="border-2 rounded-md w-full h-10 my-4 despesas-txt border-gray-200 ">
                                <option value="" selected disabled>Selecione</option>
                                <option value="alimentacao" id="alimentacao">Alimentação</option>
                                <option value="hospedagem" id="hospedagem">Hospedagem</option>
                                <option value="transporte" id="Transporte">Transporte</option>
                                <option value="servicos" id="Servicos">Servicos</option>
                                <option value="outros" id="outros">Outros</option>
                            </select>
                        </div>
                        <div>
                        <label for="price" class="font-light text-gray-600">Valor</label>
                            <input type="text" name="" id="price" class="border-2 rounded-md w-full h-10 my-4 p-4 despesas-txt border-gray-200">
                        </div>

                    </fieldset>
                <button type="submit" class="w-full h-12 rounded-md bg-[#1F8459] text-white font-bold flex items-center justify-center hover:bg-[#2CB178] disabled:bg-[#93CDB5] disabled:cursor-not-allowed transition-colors duration-200">Adicionar despesas</button>
                </form>
            </section>

            <section class="w-full bg-white rounded-xl ">
                <div class="flex gap-2 justify-between m-11">
                    <div class="flex gap-8 ">
                        <h3 class="text-2xl font-light">Minhas Solicitações</h3>
                        <span class="self-center">0 Despesas</span>
                    </div>
                    <span class="text-sm text-gray-500">R$ <span class="text-black text-2xl font-semibold">0,00</span> </span>
                </div>
                <hr class="w-[95%] justify-self-center opacity-10">
                <ul>
                    <li class="flex m-10 gap-6">
                        <div class=" bg-green-100 w-[50px] h-[50px] flex justify-center rounded-full">
                            <img src="assets/imgs/icons/Bed.svg" alt="" class="w-[35px]" id="hospedagem">
                        </div>
                        <section class="flex justify-between w-full">
                            <div>
                                <h4 class="text-xl font-bold">Hotel</h4>
                                <span id="" class="font-extralight">Hospedagem</span>
                            </div>

                            <div class="flex items-center gap-4">
                                <span class="text-sm text-gray-500">R$ <span class="text-xl text-black">0,00</span></span>
                                <button type="button" id="excluir">
                                    <svg width="25" height="25" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" class="excluir rounded-xl p-px">
                                        <path d="M26.0612 23.9387C26.343 24.2205 26.5013 24.6027 26.5013 25.0012C26.5013 25.3997 26.343 25.7819 26.0612 26.0637C25.7794 26.3455 25.3972 26.5038 24.9987 26.5038C24.6002 26.5038 24.218 26.3455 23.9362 26.0637L15.9999 18.125L8.0612 26.0612C7.7794 26.343 7.39721 26.5013 6.9987 26.5013C6.60018 26.5013 6.21799 26.343 5.9362 26.0612C5.6544 25.7794 5.49609 25.3972 5.49609 24.9987C5.49609 24.6002 5.6544 24.218 5.9362 23.9362L13.8749 16L5.9387 8.06122C5.6569 7.77943 5.49859 7.39724 5.49859 6.99872C5.49859 6.60021 5.6569 6.21802 5.9387 5.93622C6.22049 5.65443 6.60268 5.49612 7.0012 5.49612C7.39971 5.49612 7.7819 5.65443 8.0637 5.93622L15.9999 13.875L23.9387 5.93497C24.2205 5.65318 24.6027 5.49487 25.0012 5.49487C25.3997 5.49487 25.7819 5.65318 26.0637 5.93497C26.3455 6.21677 26.5038 6.59896 26.5038 6.99747C26.5038 7.39599 26.3455 7.77818 26.0637 8.05998L18.1249 16L26.0612 23.9387Z" fill="#1F8459"/>
                                        </svg>
                                </button>
                            </div>

                        </section>
                    </li>
                </ul>

            </section>
        </main>
</body>
</html>
